name: Frontend CI/CD

on:
  pull_request:
    branches: [main, production]
    paths:
      - 'src/**'
      - 'public/**'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'postcss.config.mjs'
  push:
    branches: [main, production]
    paths:
      - 'src/**'
      - 'public/**'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'postcss.config.mjs'
      - '.github/workflows/frontend.yml'
  # Manual trigger — run this on the `production` branch to build :prod and deploy
  # the prod app even when a branch push doesn't match the paths filter.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/neooiorg/laviehome-frontend

jobs:
  ci:
    name: Lint & build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npm run build
        env:
          BETTER_AUTH_SECRET: ci-build-placeholder
          BETTER_AUTH_URL: http://localhost:3000
          RESEND_API_KEY: re_placeholder
      - name: Notify Telegram - CI failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Frontend CI thất bại (lint/build)."

  build-push:
    name: Build & push image
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve environment tag
        id: env
        run: |
          # main → dev (:latest), production → prod (:prod)
          if [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.env.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
      - name: Notify Telegram - image build failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Build & push Docker image frontend thất bại."

  deploy:
    name: Trigger Dokploy redeploy
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve Dokploy target
        id: target
        run: |
          # main → dev frontend app, production → prod frontend app
          if [ "${{ github.ref }}" = "refs/heads/production" ]; then
            echo "app=qGVru91-2Nk50y1apnHRM" >> "$GITHUB_OUTPUT"
            echo "label=PRODUCTION" >> "$GITHUB_OUTPUT"
          else
            echo "app=Up82i2f3V2rALnvjhUjbM" >> "$GITHUB_OUTPUT"
            echo "label=dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Redeploy frontend on Dokploy
        run: |
          curl -sf -X POST "https://dokploy.neooi.com/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"${{ steps.target.outputs.app }}\"}"
      - name: Notify Telegram - Deploy success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh success "🚀 Frontend deploy lên ${{ steps.target.outputs.label }} thành công!"
      - name: Notify Telegram - Deploy failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Trigger Dokploy redeploy frontend thất bại."
