name: Frontend CI/CD

on:
  pull_request:
    branches: [main, production]
    paths:
      - 'src/**'
      - 'public/**'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'postcss.config.mjs'
  push:
    branches: [main, production]
    paths:
      - 'src/**'
      - 'public/**'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'postcss.config.mjs'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/neooiorg/laviehome-frontend

jobs:
  ci:
    name: Lint & build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Notify Telegram - CI failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Frontend CI thất bại (lint/build)."

  build-push:
    name: Build & push image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      - name: Notify Telegram - image build failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Build & push Docker image frontend thất bại."

  deploy:
    name: Trigger Dokploy redeploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy frontend on Dokploy
        run: |
          curl -sf -X POST "https://dokploy.neooi.com/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"Up82i2f3V2rALnvjhUjbM"}'
      - name: Notify Telegram - Deploy success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh success "🚀 Frontend deploy lên production thành công!"
      - name: Notify Telegram - Deploy failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Trigger Dokploy redeploy frontend thất bại."
