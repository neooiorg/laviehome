name: Backend CI/CD

on:
  pull_request:
    branches: [main, production]
    paths:
      - 'backend/**'
  push:
    branches: [main, production]
    paths:
      - 'backend/**'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/neooiorg/laviehome-backend

jobs:
  ci:
    name: Build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npm run build --workspace=apps/backend
      - name: Notify Telegram - CI failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Backend CI thất bại (build)."

  build-push:
    name: Build & push image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      - name: Notify Telegram - image build failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Build & push Docker image backend thất bại."

  deploy:
    name: Trigger Dokploy redeploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy backend on Dokploy
        run: |
          curl -sf -X POST "https://dokploy.neooi.com/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"IjU-Rx3A0PrpXYxMceLty"}'
      - name: Notify Telegram - Deploy success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh success "🚀 Backend deploy lên production thành công!"
      - name: Notify Telegram - Deploy failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Trigger Dokploy redeploy backend thất bại."
