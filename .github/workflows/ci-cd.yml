name: CI/CD

on:
  pull_request:
    branches: [main, production]
  push:
    branches: [main, production]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/neooiorg/laviehome-backend
  FRONTEND_IMAGE: ghcr.io/neooiorg/laviehome-frontend

jobs:
  ci-frontend:
    name: Lint & build check (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npm run build
      - name: Notify Telegram - Frontend CI failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Frontend CI thất bại (lint/build)."

  ci-backend:
    name: Build check (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --legacy-peer-deps
      - run: npm run build --workspace=apps/backend
      - name: Notify Telegram - Backend CI failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Backend CI thất bại (build Medusa)."

  build-push-frontend:
    name: Build & push frontend image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci-frontend, ci-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
      - name: Notify Telegram - Frontend image build failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Build & push Docker image frontend thất bại."

  build-push-backend:
    name: Build & push backend image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci-frontend, ci-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      - name: Notify Telegram - Backend image build failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Build & push Docker image backend thất bại."

  deploy:
    name: Trigger Dokploy redeploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-push-frontend, build-push-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Redeploy backend on Dokploy
        run: |
          curl -sf -X POST "https://dokploy.neooi.com/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"IjU-Rx3A0PrpXYxMceLty"}'
      - name: Redeploy frontend on Dokploy
        run: |
          curl -sf -X POST "https://dokploy.neooi.com/api/application.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"applicationId":"Up82i2f3V2rALnvjhUjbM"}'
      - name: Notify Telegram - Deploy success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh success "🚀 Deploy lên production thành công!"
      - name: Notify Telegram - Deploy failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          chmod +x scripts/telegram_notify.sh
          ./scripts/telegram_notify.sh failure "❌ Trigger Dokploy redeploy thất bại."
